version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Gantt SaaS — Docker Compose
#
# Three mutually-exclusive profiles control which database backend is used.
# Start the app with ONE of these commands:
#
#   SQLite (default, no extra services):
#     docker compose up -d
#
#   MariaDB:
#     docker compose --profile mariadb up -d
#
#   PostgreSQL:
#     docker compose --profile postgres up -d
#
# IMPORTANT: Set JWT_SECRET to a strong random value before deploying.
# Generate one with:
#   node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Application (SQLite — default profile) ───────────────────────────────
  gantt:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - gantt_data:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=change_this_secret_in_production
      - DB_DRIVER=sqlite
      - DATABASE_PATH=/app/data/gantt.db
    restart: unless-stopped

