<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gantt SaaS — Acceso</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-card: #0f3460;
      --bg-input: #1a1a3e;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0c0;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --success: #2ecc71;
      --warning: #f39c12;
      --info: #3498db;
      --border: #2a2a4a;
      --radius: 8px;
      --transition: 0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .brand h1 span { color: var(--accent); }

    .brand p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 1rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
      background: rgba(233, 69, 96, 0.05);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text-primary);
      background: rgba(255,255,255,0.03);
    }

    .tab-panel { display: none; padding: 2rem; }
    .tab-panel.active { display: block; }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: var(--transition);
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(233,69,96,0.15);
    }

    select option { background: var(--bg-input); }

    .btn {
      display: block;
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 0.5rem;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: rgba(233,69,96,0.1);
      border: 1px solid rgba(233,69,96,0.3);
      color: var(--accent-hover);
      padding: 0.7rem 1rem;
      border-radius: var(--radius);
      font-size: 0.87rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-msg.visible { display: block; }

    .success-msg {
      background: rgba(46,204,113,0.1);
      border: 1px solid rgba(46,204,113,0.3);
      color: var(--success);
      padding: 0.7rem 1rem;
      border-radius: var(--radius);
      font-size: 0.87rem;
      margin-bottom: 1rem;
      display: none;
    }

    .success-msg.visible { display: block; }

    .hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.3rem;
    }

    @media (max-width: 480px) {
      .tab-panel { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="brand">
      <h1>Gantt<span>SaaS</span></h1>
      <p>Gestión de proyectos para equipos pequeños</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Iniciar Sesión</button>
        <button class="tab-btn" data-tab="register">Registrarse</button>
      </div>

      <!-- Login Panel -->
      <div class="tab-panel active" id="login">
        <div class="error-msg" id="login-error"></div>
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="login-email">Correo electrónico</label>
            <input type="email" id="login-email" placeholder="correo@ejemplo.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" placeholder="Tu contraseña" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn" id="login-btn">Iniciar Sesión</button>
        </form>
      </div>

      <!-- Register Panel -->
      <div class="tab-panel" id="register">
        <div class="error-msg" id="reg-error"></div>
        <div class="success-msg" id="reg-success"></div>
        <form id="reg-form" novalidate>
          <div class="form-group">
            <label for="reg-email">Correo electrónico</label>
            <input type="email" id="reg-email" placeholder="correo@ejemplo.com" required>
          </div>
          <div class="form-group">
            <label for="reg-username">Nombre de usuario</label>
            <input type="text" id="reg-username" placeholder="Tu nombre" required>
          </div>
          <div class="form-group">
            <label for="reg-role">Rol</label>
            <select id="reg-role">
              <option value="member">Miembro del equipo</option>
              <option value="team_leader">Líder de equipo</option>
            </select>
            <p class="hint">Los líderes pueden crear equipos y proyectos.</p>
          </div>
          <div class="form-group">
            <label for="reg-password">Contraseña</label>
            <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required>
          </div>
          <div class="form-group">
            <label for="reg-confirm">Confirmar contraseña</label>
            <input type="password" id="reg-confirm" placeholder="Repite tu contraseña" required>
          </div>
          <button type="submit" class="btn" id="reg-btn">Crear cuenta</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tab).classList.add('active');
      });
    });

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError(id) {
      document.getElementById(id).classList.remove('visible');
    }

    function showSuccess(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError('login-error');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        return showError('login-error', 'Por favor completa todos los campos.');
      }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Accediendo...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          showError('login-error', data.error || 'Error al iniciar sesión');
        } else {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/app.html';
        }
      } catch {
        showError('login-error', 'No se pudo conectar con el servidor.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Iniciar Sesión';
      }
    });

    // Register
    document.getElementById('reg-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError('reg-error');
      document.getElementById('reg-success').classList.remove('visible');

      const email = document.getElementById('reg-email').value.trim();
      const username = document.getElementById('reg-username').value.trim();
      const role = document.getElementById('reg-role').value;
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (!email || !username || !password || !confirm) {
        return showError('reg-error', 'Por favor completa todos los campos.');
      }
      if (password.length < 6) {
        return showError('reg-error', 'La contraseña debe tener al menos 6 caracteres.');
      }
      if (password !== confirm) {
        return showError('reg-error', 'Las contraseñas no coinciden.');
      }

      const btn = document.getElementById('reg-btn');
      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, username, password, role })
        });
        const data = await res.json();
        if (!res.ok) {
          showError('reg-error', data.error || 'Error al registrarse');
        } else {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/app.html';
        }
      } catch {
        showError('reg-error', 'No se pudo conectar con el servidor.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/app.html';
    }
  </script>
</body>
</html>
